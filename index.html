<!DOCTYPE html>
<html lang="pt-br">

<head>


    <!-- Titulo -->
    <title>Tela de login</title>
    <!-- Titulo -->

    <!-- Meta arquivos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="card, blog pessoal, informação">
    <meta name="description" content="meu card pessoal feito especialmente para projeto, 01 projeto">
    <meta name="author" content="Samuel Pacheco Falcão Rodrigues">
    <meta name="robots" content="index, follow">
    <!-- Meta arquivos -->

    <!-- font cloudflare 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Link css -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Link css -->
</head>

<body>

    <div class="wrapper">
        <div class="title"><span>Formulário de Login</span></div>
        <form action="#">
            <div class="row">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Email ou Num. Celular" required>
            </div>

            <div class="row">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Senha" required>
            </div>

            <div class="pass"><a href="#">Esqueceu a Senha?</a></div>

            <div class="row button">
                <input type="submit" value="Entrar">

            </div>

            <div class="signup-link">Não é um membro?<a href="#" class="linkcadastre">Se Cadastre</a>

            </div>
        </form>
    </div>










</body>

</html>
